<style>
  /* --- WRAPPER (POINTER EVENTS NONE) --- */
  .posmars-overlay-wrapper {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 16px) 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  /* --- TOP BAR --- */
  .hud-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
  }

  /* --- BRAND LOGO --- */
  .brand-logo-container {
    position: absolute;
    top: calc(env(safe-area-inset-top) + 16px);
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 5;
  }

  .hud-logo {
    height: 32px;
    max-width: 110px;
    object-fit: contain;
    filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
  }

  /* --- STATS BOXES --- */
  .stat-box {
    background: rgba(15, 23, 42, 0.65);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.15);
    padding: 6px 14px;
    border-radius: 99px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25), 
                inset 0 0 8px rgba(255, 255, 255, 0.05);
    transition: all 0.3s ease;
  }

  .score-box {
    border-color: {{primary_color}}40;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25),
                0 0 15px -3px {{primary_color}}20,
                inset 0 0 8px rgba(255, 255, 255, 0.05);
  }

  .time-box {
    animation: slowPulse 2s infinite ease-in-out;
  }

  @keyframes slowPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.02); }
  }

  .stat-icon-wrapper {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: {{primary_color}};
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffffff;
    box-shadow: 0 0 10px {{primary_color}}60;
  }

  .stat-icon {
    width: 15px;
    height: 15px;
  }

  .stat-content {
    display: flex;
    flex-direction: column;
  }

  .stat-label {
    font-size: 0.6rem;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.5);
    font-weight: 800;
    letter-spacing: 0.05em;
    line-height: 1;
    margin-bottom: 2px;
  }

  .stat-value {
    font-size: 1.1rem;
    font-weight: 900;
    color: #ffffff;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
    text-shadow: 0 0 8px {{primary_color}}50;
  }

  /* --- BOTTOM BAR --- */
  .hud-bottom-bar {
    display: flex;
    justify-content: space-between;
    width: 100%;
    margin-bottom: 8px;
  }

  .hud-mini-stat {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 6px 12px;
    border-radius: 99px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
  }

  .mini-icon {
    width: 14px;
    height: 14px;
  }

  .mini-label {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 700;
  }

  .mini-value {
    font-size: 0.85rem;
    font-weight: 900;
    font-variant-numeric: tabular-nums;
    font-feature-settings: "tnum";
  }

  .caught-stat {
    border-color: rgba(16, 185, 129, 0.2);
  }

  .caught-stat .mini-icon {
    color: #10b981;
    filter: drop-shadow(0 0 4px rgba(16, 185, 129, 0.4));
  }

  .caught-stat .mini-value {
    color: #10b981;
    text-shadow: 0 0 6px rgba(16, 185, 129, 0.4);
  }

  .bomb-stat {
    border-color: rgba(239, 68, 68, 0.2);
  }

  .bomb-stat .mini-icon {
    color: #ef4444;
    filter: drop-shadow(0 0 4px rgba(239, 68, 68, 0.4));
    animation: heartBeat 1.2s infinite ease-in-out;
  }

  .bomb-stat .mini-value {
    color: #ef4444;
    text-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
  }

  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.15); }
  }

  /* Responsive Adjustments */
  @media (max-width: 360px) {
    .stat-box {
      padding: 5px 10px;
      gap: 6px;
    }
    .stat-icon-wrapper {
      width: 22px;
      height: 22px;
    }
    .stat-icon {
      width: 12px;
      height: 12px;
    }
    .stat-value {
      font-size: 0.95rem;
    }
    .hud-logo {
      height: 26px;
    }
  }
</style>

<div class="posmars-overlay-wrapper">
  <!-- Top Bar HUD -->
  <div class="hud-top-bar">
    <!-- Score Box (Left) -->
    <div class="stat-box score-box">
      <div class="stat-icon-wrapper">
        <!-- Gift Icon SVG -->
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 12 20 22 4 22 4 12"></polyline>
          <rect x="2" y="7" width="20" height="5"></rect>
          <line x1="12" y1="22" x2="12" y2="7"></line>
          <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
          <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Điểm</span>
        <span class="stat-value">{{score}}</span>
      </div>
    </div>

    <!-- Brand Logo (Center) -->
    <div class="brand-logo-container">
      <img src="{{logo_url}}" alt="Logo" class="hud-logo" onerror="this.style.display='none';" />
    </div>

    <!-- Time Box (Right) -->
    <div class="stat-box time-box">
      <div class="stat-icon-wrapper">
        <!-- Clock Icon SVG -->
        <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>
      <div class="stat-content">
        <span class="stat-label">Thời gian</span>
        <span class="stat-value">{{time_left}}s</span>
      </div>
    </div>
  </div>

  <!-- Bottom Bar HUD -->
  <div class="hud-bottom-bar">
    <!-- Caught Items (Left) -->
    <div class="hud-mini-stat caught-stat">
      <!-- Star Icon SVG -->
      <svg class="mini-icon" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
      </svg>
      <span class="mini-label">Đã hứng:</span>
      <span class="mini-value">{{items_caught}}</span>
    </div>

    <!-- Bombs Hit (Right) -->
    <div class="hud-mini-stat bomb-stat">
      <!-- Bomb / Warning Icon SVG -->
      <svg class="mini-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"></path>
        <line x1="12" y1="9" x2="12" y2="13"></line>
        <line x1="12" y1="17" x2="12.01" y2="17"></line>
      </svg>
      <span class="mini-label">Trúng bom:</span>
      <span class="mini-value">{{bombs_hit}}</span>
    </div>
  </div>
</div>
