<style>
  /* --- BASE & WRAPPER --- */
  .posmars-intro-wrapper {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    min-height: 100%;
    padding: 2rem 1rem;
    box-sizing: border-box;
    /* Wrapper ngoài cùng phải là trong suốt để Intro overlay đè lên camera */
    background: transparent; 
    position: relative;
    z-index: 10;
  }
  
  /* --- MAIN PANEL (GLASSMORPHISM) --- */
  .posmars-intro-panel {
    width: 100%;
    max-width: 420px;
    
    /* Nền được gán trực tiếp qua inline style dưới HTML theo yêu cầu hệ thống */

    border-radius: 24px;
    /* Tăng cường hiệu ứng Glassmorphism: Thêm inset shadow để viền kính sáng và sâu hơn */
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25), 
                inset 0 0 20px rgba(255, 255, 255, 0.5),
                0 0 30px -10px {{primary_color}}40;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    /* Làm viền rõ nét hơn */
    border: 2px solid rgba(255, 255, 255, 0.7);
    display: flex;
    flex-direction: column;
    padding: 0; /* Đổi về 0 để đồng bộ cấu hình */
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    /* Cho phép floating USP tràn ra ngoài */
    overflow: visible; 
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* --- BRANDING HEADER --- */
  .intro-logo {
    width: 100%;
    max-width: 180px; 
    height: auto;
    max-height: 80px; 
    object-fit: contain;
    margin: 2rem auto 1.25rem auto; /* Thêm khoảng cách phía trên do panel padding = 0 */
    display: block;
    position: relative;
    z-index: 3;
  }

  /* --- BANNER --- */
  .intro-banner {
    width: 100%; 
    max-width: none;
    margin: 0; 
    height: auto;
    display: block;
    border-radius: 0; /* Không bo góc */
    position: relative;
    z-index: 3;
  }

  /* --- BỘ CỤC NỘI DUNG (KHỐI TRẮNG) --- */
  .intro-content-box {
    background: #ffffff;
    margin: 0 1.25rem 1.25rem 1.25rem; /* Margins left-right-bottom đồng đều, top chạm banner */
    padding: 2rem;
    border-radius: 24px; /* Bo tròn đều cả 4 góc */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center; /* Căn giữa dọc nội dung để cân đối khoảng trống */
    min-height: 180px; /* Đảm bảo chiều cao tối thiểu hợp lý */
    position: relative;
    z-index: 3;
    box-sizing: border-box;
    box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
  }

  /* --- TYPOGRAPHY --- */
  .intro-title {
    margin: 0 0 0.5rem 0;
    font-size: 1.4rem;
    font-weight: 800;
    text-align: center;
    color: #0f172a; /* Dùng màu đen sẫm thay vì {{text_color}} (tránh bị trùng màu trắng của card) */
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }

  .intro-title:empty {
    display: none;
  }

  .intro-desc {
    margin: 0 0 1.5rem 0;
    font-size: 0.95rem;
    color: #475569; /* Dùng màu xám đậm để dễ đọc trên nền card trắng */
    opacity: 0.9;
    text-align: center;
    line-height: 1.5;
  }

  .intro-desc:empty {
    display: none; /* Ẩn hoàn toàn khoảng chiếm dụng của desc nếu rỗng */
  }

  .camera-hint {
    font-size: 0.85rem;
    color: #0f172a;
    font-weight: 700;
    text-align: center;
    margin-bottom: 1.5rem;
    line-height: 1.6;
    letter-spacing: 0.01em;
  }



  /* --- ACTION BUTTON --- */
  .start-btn {
    position: relative;
    width: 100%;
    padding: 1.15rem;
    background: {{primary_color}}; 
    color: #ffffff; 
    font-size: 1rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    border-radius: 99px; /* Dạng Pill */
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    box-shadow: 0 8px 15px -5px {{primary_color}}80;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    box-sizing: border-box; /* Fix lỗi tràn viền gây lệch nút */
  }

  .start-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
    transform: translateX(-100%);
    transition: transform 0.6s ease;
  }

  .start-btn:hover:not([data-loading="true"]) {
    transform: translateY(-2px);
    box-shadow: 0 12px 20px -5px {{primary_color}}aa;
  }

  .start-btn:hover:not([data-loading="true"])::after {
    transform: translateX(100%);
  }

  .start-btn:active:not([data-loading="true"]) {
    transform: translateY(1px);
    box-shadow: 0 4px 10px -5px {{primary_color}}80;
  }

  /* --- LOADING STATE --- */
  .start-btn[data-loading="true"] {
    background: {{primary_color}}; 
    color: #ffffff; 
    opacity: 0.7;
    box-shadow: none;
    cursor: not-allowed;
    border: none;
  }

  .btn-spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3); /* Dùng viền trắng mờ để nổi bật trên nền tím */
    border-top-color: #ffffff; /* Đầu xoay màu trắng để nhìn thấy được */
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .btn-arrow {
    display: block;
  }

  .start-btn[data-loading="true"] .btn-spinner { display: block; }
  .start-btn[data-loading="true"] .btn-arrow { display: none; }

  /* --- FLOATING USPS --- */
  .floating-usps-container {
    position: absolute;
    inset: 0; 
    pointer-events: none; 
    z-index: 10; 
  }

  .usp-item {
    position: absolute;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.1)); 
    animation: float 6s ease-in-out infinite;
  }

  /* Đưa các USP nổi ra bên ngoài rìa card để tránh đè lên nội dung */
  .usp-1 {
    width: 55px;
    top: 10%;
    left: -35px; 
    animation-delay: 0s;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
  }

  .usp-2 {
    width: 60px;
    top: 25%;
    right: -40px; 
    animation-delay: -2s;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
  }

  .usp-3 {
    width: 50px;
    top: 48%;
    right: -30px;
    animation-delay: -4s;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.15));
  }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  /* Responsive an toàn cho màn hình di động nhỏ */
  @media (max-width: 480px) {
    .posmars-intro-panel { 
      padding: 0;
      margin: 0 1.75rem; /* Tăng margin để thu hẹp card, tạo không gian bên ngoài cho USP bay lượn */
    }
    .intro-banner {
      width: 100%;
      margin: 0;
    }
    .intro-content-box {
      width: auto;
      margin: 0 1rem 1rem 1rem;
      padding: 1.75rem 1.5rem 2rem 1.5rem;
    }
    /* Đưa USP ra rìa ngoài nhẹ trên mobile, đảm bảo không bị mất cạnh nhờ khoảng margin 1.75rem bên trên */
    .usp-1 { width: 45px; left: -20px; top: 8%; }
    .usp-2 { width: 45px; right: -20px; top: 22%; }
    .usp-3 { width: 40px; right: -15px; top: 42%; }
  }
</style>

<div class="posmars-intro-wrapper">
  <!-- Gán trực tiếp panel_background vào inline style -->
  <div class="posmars-intro-panel" style="background: {{panel_background}};">
    
    <!-- Floating USPs -->
    <div class="floating-usps-container">
      <img src="{{extra_asset_usp1}}" class="usp-item usp-1" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp2}}" class="usp-item usp-2" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp3}}" class="usp-item usp-3" onerror="this.style.display='none';" />
    </div>

    <!-- Header Logo -->
    <img src="{{logo_url}}" alt="Brand Logo" class="intro-logo" onerror="this.style.display='none';" />

    <!-- Banner -->
    <img src="{{banner_url}}" alt="Intro Banner" class="intro-banner" onerror="this.style.display='none';" />

    <!-- Box Nội Dung Trắng (Gắn sát banner) -->
    <div class="intro-content-box">
      <!-- Hướng dẫn camera -->
      <div class="camera-hint">Vui lòng chấp nhận quyền truy cập camera để bắt đầu.</div>


      <!-- Nút Bắt đầu -->
      <button 
        class="start-btn" 
        data-action="start" 
        data-loading="{{is_camera_loading}}"
      >
        <div class="btn-spinner"></div>
        <span>{{camera_loading_status}}</span>
        <svg class="btn-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
  // Script hỗ trợ debug các tài sản nổi (USP)
  document.addEventListener("DOMContentLoaded", function() {
    console.log("=== POSMARS FLOATING ASSETS DEBUG ===");
    console.log("USP 1 URL:", "{{extra_asset_usp1}}");
    console.log("USP 2 URL:", "{{extra_asset_usp2}}");
    console.log("USP 3 URL:", "{{extra_asset_usp3}}");
    
    const items = [
      { id: 1, url: "{{extra_asset_usp1}}", el: document.querySelector('.usp-1') },
      { id: 2, url: "{{extra_asset_usp2}}", el: document.querySelector('.usp-2') },
      { id: 3, url: "{{extra_asset_usp3}}", el: document.querySelector('.usp-3') }
    ];
    
    items.forEach(item => {
      if (item.el) {
        item.el.addEventListener('error', function() {
          console.error(`[POSMARS DEBUG] USP ${item.id} tải thất bại. URL gốc:`, item.url);
        });
        item.el.addEventListener('load', function() {
          console.log(`[POSMARS DEBUG] USP ${item.id} tải thành công! URL:`, item.el.src);
        });
      }
    });
  });
</script>
