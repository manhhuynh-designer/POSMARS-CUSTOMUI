<style>
  /* --- BASE & WRAPPER --- */
  .posmars-result-wrapper {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 2rem 1rem;
    box-sizing: border-box;
    background: transparent; 
    position: relative;
    z-index: 10;
  }
  
  /* --- MAIN PANEL --- */
  .posmars-result-panel {
    width: 100%;
    max-width: 420px;
    background: {{panel_background}};
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    display: flex;
    flex-direction: column;
    padding: 0;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    overflow: visible; 
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* --- BRANDING HEADER --- */
  .result-top-bar {
    padding: 2rem 2rem 1rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .result-logo {
    width: 145px;
    max-height: 65px; 
    object-fit: contain;
    transform: scale(var(--logo-scale, 1));
    transform-origin: center;
  }

  /* --- BANNER --- */
  .result-banner {
    width: 100%; 
    height: auto;
    display: block;
    margin-bottom: 0; 
  }

  /* --- WHITE CONTENT BOX --- */
  .result-content-box {
    background: #ffffff;
    margin: 0; 
    padding: 2rem;
    border-radius: 0 0 24px 24px; 
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 3;
    box-sizing: border-box;
  }

  /* --- TYPOGRAPHY --- */
  .result-title {
    margin: 0 0 0.5rem 0;
    font-size: 1.4rem;
    font-weight: 800;
    text-align: center;
    color: #0f172a; 
    text-transform: uppercase;
  }

  .result-desc {
    margin: 0 0 1.5rem 0;
    font-size: 0.95rem;
    color: #64748b; 
    text-align: center;
    line-height: 1.5;
  }


  /* --- ACTIONS --- */
  .action-btn {
    width: 100%;
    padding: 1rem;
    background: #0f172a;
    color: #ffffff;
    font-weight: 800;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    font-size: 0.9rem;
    transition: all 0.3s ease;
  }
  
  .share-btn { 
    background: {{primary_color}}; 
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 {{primary_color}}66; }
    70% { box-shadow: 0 0 0 10px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* --- PHOTO PREVIEW --- */
  .photo-preview-container {
    width: 100%;
    max-width: 250px;
    aspect-ratio: 9 / 16;
    background: #0f172a;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    margin: 0 auto 1.25rem auto;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    cursor: pointer;
  }

  .photo-preview {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  /* --- PHOTO ZOOM MODAL --- */
  .photo-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    cursor: pointer;
    pointer-events: auto !important;
  }

  .photo-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .photo-modal-content {
    position: relative;
    max-width: 90%;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    border: 3px solid #ffffff;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 10;
    animation: photoModalScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes photoModalScale {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .photo-modal-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s;
  }

  .photo-modal-close:hover {
    background: rgba(239, 68, 68, 0.9);
  }

  .restart-link {
    margin-top: 1rem; 
    font-size: 0.75rem; 
    color: #94a3b8; 
    text-transform: uppercase; 
    text-decoration: underline;
    cursor: pointer;
  }



  /* --- FLOATING USPS --- */
  .floating-usps-container {
    position: absolute;
    inset: 0; 
    pointer-events: none; 
    z-index: 10; 
  }

  .usp-item {
    position: absolute;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08)); 
    animation: float 6s ease-in-out infinite;
  }

  .usp-1 { width: 55px; top: 5%; left: 12px; }
  .usp-2 { width: 60px; top: 12%; right: 12px; }
  .usp-3 { width: 50px; top: 20%; right: 16px; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }

  /* Responsive */
  @media (max-width: 480px) {
    .posmars-result-panel {
      margin: 0 0.5rem;
    }
    .usp-1 { width: 45px; left: 12px; top: 4%; }
    .usp-2 { width: 45px; right: 12px; top: 8%; }
    .usp-3 { width: 40px; right: 16px; top: 16%; }
  }
</style>

<div class="posmars-result-wrapper" style="background: {{main_background}};">
  <div class="posmars-result-panel" style="background: {{panel_background}};">
    
    <div class="floating-usps-container">
      <img src="{{extra_asset_usp1}}" class="usp-item usp-1" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp2}}" class="usp-item usp-2" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp3}}" class="usp-item usp-3" onerror="this.style.display='none';" />
    </div>

    <div class="result-top-bar">
      <img src="{{logo_url}}" alt="Logo" class="result-logo" style="--logo-scale: {{logo_scale}};" onerror="this.style.display='none';" />
    </div>
    
    <img src="{{extra_asset_banner}}" alt="Banner" class="result-banner" onerror="this.style.display='none';" />

    <div class="result-content-box">
      <h1 class="result-title">{{result_title}}</h1>
      <p class="result-desc">{{result_message}}</p>

      <!-- Photo Preview Container -->
      <div class="photo-preview-container" onclick="openPhotoModal()">
        <img class="photo-preview" src="{{result_image}}" onerror="handlePhotoError(this);" />
      </div>

      <button class="action-btn share-btn" data-action="share">Chia sẻ ngay</button>
      
      <button class="action-btn" style="background:transparent; color:#64748b; border: 1px solid #e2e8f0;" data-action="download">Tải ảnh</button>
      
      <a class="restart-link" data-action="restart">Chơi lại</a>
    </div>
  </div>

  <!-- Photo Modal (Dialog lớn xem ảnh full screen) -->
  <div id="photo-modal" class="photo-modal" style="display: none;" onclick="closePhotoModal()">
    <div class="photo-modal-backdrop"></div>
    <img id="modal-photo-img" class="photo-modal-content" src="" />
    <button class="photo-modal-close" onclick="closePhotoModal()">&times;</button>
  </div>
</div>

<script>
  function openPhotoModal() {
    const previewImg = document.querySelector('.photo-preview');
    const modal = document.getElementById('photo-modal');
    const modalImg = document.getElementById('modal-photo-img');
    if (previewImg && modal && modalImg) {
      modalImg.src = previewImg.src;
      modal.style.display = 'flex';
    }
  }

  function closePhotoModal() {
    const modal = document.getElementById('photo-modal');
    if (modal) {
      modal.style.display = 'none';
    }
  }

  function handlePhotoError(img) {
    const imageUrl = "{{image_url}}".trim();
    if (imageUrl && !imageUrl.includes('{{image_url}}') && img.src !== imageUrl) {
      img.src = imageUrl;
    } else {
      // Fallback to a placeholder image if loading fails
      img.src = 'https://placehold.co/600x400/f1f5f9/0f172a?text=AR+Photo';
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    // 1. Photo Preview selection logic
    const resultImage = "{{result_image}}".trim();
    const imageUrl = "{{image_url}}".trim();
    
    const hasResultImage = resultImage && !resultImage.includes('{{result_image}}');
    const hasImageUrl = imageUrl && !imageUrl.includes('{{image_url}}');

    const photoImg = document.querySelector('.photo-preview');

    if (photoImg) {
      if (hasResultImage) {
        photoImg.src = resultImage;
      } else if (hasImageUrl) {
        photoImg.src = imageUrl;
      } else {
        // Safe default placeholder for Admin edit modes
        photoImg.src = 'https://placehold.co/600x400/f1f5f9/0f172a?text=AR+Photo';
      }
    }
  });
</script>
