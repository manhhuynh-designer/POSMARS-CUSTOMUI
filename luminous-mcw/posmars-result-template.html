<style>
  /* --- BASE & WRAPPER --- */
  .posmars-result-wrapper {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    padding: 2rem 1rem;
    box-sizing: border-box;
    background: transparent; 
    position: relative;
    z-index: 10;
  }
  
  /* --- MAIN PANEL --- */
  .posmars-result-panel {
    width: 100%;
    max-width: 420px;
    background: {{panel_background}};
    border-radius: 24px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    display: flex;
    flex-direction: column;
    padding: 0;
    animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    position: relative;
    overflow: visible; 
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  /* --- BRANDING HEADER --- */
  .result-top-bar {
    padding: 2rem 2rem 1rem 2rem;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .result-logo {
    width: 145px;
    max-height: 65px; 
    object-fit: contain;
  }

  /* --- BANNER --- */
  .result-banner {
    width: 100%; 
    height: auto;
    display: block;
    margin-bottom: 0; 
  }

  /* --- WHITE CONTENT BOX --- */
  .result-content-box {
    background: #ffffff;
    margin: 0; 
    padding: 2rem;
    border-radius: 0 0 24px 24px; 
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    z-index: 3;
    box-sizing: border-box;
  }

  /* --- TYPOGRAPHY --- */
  .result-title {
    margin: 0 0 0.5rem 0;
    font-size: 1.4rem;
    font-weight: 800;
    text-align: center;
    color: #0f172a; 
    text-transform: uppercase;
  }

  .result-desc {
    margin: 0 0 1.5rem 0;
    font-size: 0.95rem;
    color: #64748b; 
    text-align: center;
    line-height: 1.5;
  }

  /* --- VOUCHER CARD --- */
  .voucher-card {
    width: 100%;
    background: #f8fafc;
    border: 2px dashed #cbd5e1;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .voucher-label { font-size: 0.75rem; font-weight: 700; color: {{primary_color}}; text-transform: uppercase; }
  .voucher-code { font-size: 1.5rem; font-weight: 900; color: #0f172a; font-family: monospace; }
  
  .copy-btn {
    padding: 0.6rem 1.5rem;
    background: {{primary_color}};
    color: #ffffff;
    font-size: 0.8rem;
    font-weight: 800;
    text-transform: uppercase;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    margin-top: 0.5rem;
    transition: all 0.3s ease;
  }

  .copy-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
  .copy-btn:active { transform: scale(0.95); }

  /* --- ACTIONS --- */
  .action-btn {
    width: 100%;
    padding: 1rem;
    background: #0f172a;
    color: #ffffff;
    font-weight: 800;
    border-radius: 99px;
    border: none;
    cursor: pointer;
    margin-bottom: 0.75rem;
    text-transform: uppercase;
    font-size: 0.9rem;
    transition: all 0.3s ease;
  }
  
  .share-btn { 
    background: {{primary_color}}; 
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 {{primary_color}}66; }
    70% { box-shadow: 0 0 0 10px transparent; }
    100% { box-shadow: 0 0 0 0 transparent; }
  }

  /* --- VIDEO THUMBNAIL --- */
  .video-thumbnail-container {
    width: 100%;
    aspect-ratio: 16 / 9;
    background: #0f172a;
    border-radius: 16px;
    overflow: hidden;
    position: relative;
    margin-bottom: 1.25rem;
    cursor: pointer;
    border: 1px solid #e2e8f0;
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .video-thumbnail-container:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
  }

  .video-thumbnail {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0.85;
  }

  .video-play-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    background: rgba(15, 23, 42, 0.4);
    color: #ffffff;
    transition: background 0.2s ease;
  }

  .video-thumbnail-container:hover .video-play-overlay {
    background: rgba(15, 23, 42, 0.5);
  }

  .play-icon-wrapper {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: {{primary_color}};
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px {{primary_color}}66;
    transition: transform 0.2s ease;
  }

  .video-thumbnail-container:hover .play-icon-wrapper {
    transform: scale(1.1);
  }

  .play-icon {
    width: 18px;
    height: 18px;
    fill: #ffffff;
    margin-left: 2px;
  }

  .video-play-text {
    font-size: 0.85rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* --- VIDEO MODAL --- */
  .video-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
  }

  .video-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .video-modal-content {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16 / 9;
    background: #000000;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.1);
    z-index: 10;
    animation: modalScale 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes modalScale {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .video-modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.2);
    color: #ffffff;
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s, transform 0.2s;
  }

  .video-modal-close:hover {
    background: rgba(239, 68, 68, 0.9);
    transform: rotate(90deg);
  }

  #modal-video-player {
    width: 100%;
    height: 100%;
    object-fit: contain;
  }

  .restart-link {
    margin-top: 1rem; 
    font-size: 0.75rem; 
    color: #94a3b8; 
    text-transform: uppercase; 
    text-decoration: underline;
    cursor: pointer;
  }

  /* --- FLOATING USPS --- */
  .floating-usps-container {
    position: absolute;
    inset: 0; 
    pointer-events: none; 
    z-index: 4; 
  }

  .usp-item {
    position: absolute;
    height: auto;
    object-fit: contain;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.08)); 
    animation: float 6s ease-in-out infinite;
  }

  .usp-1 { width: 55px; top: 5%; left: -25px; }
  .usp-2 { width: 60px; top: 12%; right: -25px; }
  .usp-3 { width: 50px; top: 20%; right: -15px; }

  @keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
  }
</style>

<div class="posmars-result-wrapper">
  <div class="posmars-result-panel" style="background: {{panel_background}};">
    
    <div class="floating-usps-container">
      <img src="{{extra_asset_usp1}}" class="usp-item usp-1" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp2}}" class="usp-item usp-2" onerror="this.style.display='none';" />
      <img src="{{extra_asset_usp3}}" class="usp-item usp-3" onerror="this.style.display='none';" />
    </div>

    <div class="result-top-bar">
      <img src="{{logo_url}}" alt="Logo" class="result-logo" onerror="this.style.display='none';" />
    </div>
    
    <img src="{{extra_asset_banner}}" alt="Banner" class="result-banner" onerror="this.style.display='none';" />

    <div class="result-content-box">
      <h1 class="result-title">{{result_title}}</h1>
      <p class="result-desc">{{result_message}}</p>

      

      <button class="action-btn share-btn" data-action="share">Chia sẻ ngay</button>
      <!-- Thumbnail Video -->
      <div class="video-thumbnail-container" data-action="play-video" onclick="openVideoModal()">
        <video class="video-thumbnail" src="{{video_url}}#t=0.1" preload="metadata" muted playsinline onerror="this.closest('.video-thumbnail-container').style.display='none';"></video>
        <div class="video-play-overlay">
          <div class="play-icon-wrapper">
            <svg class="play-icon" viewBox="0 0 24 24">
              <polygon points="5 3 19 12 5 21 5 3"></polygon>
            </svg>
          </div>
          <span class="video-play-text">Xem lại video</span>
        </div>
      </div>
      <button class="action-btn" style="background:transparent; color:#64748b; border: 1px solid #e2e8f0;" data-action="download">Tải ảnh/video</button>
      
      <a class="restart-link" data-action="restart">Chơi lại</a>
    </div>
  </div>
</div>

<!-- Video Modal (Dialog lớn xem video) -->
<div id="video-modal" class="video-modal" style="display: none;">
  <div class="video-modal-backdrop" onclick="closeVideoModal()"></div>
  <div class="video-modal-content">
    <button class="video-modal-close" onclick="closeVideoModal()">&times;</button>
    <video id="modal-video-player" src="{{video_url}}" controls playsinline></video>
  </div>
</div>

<script>
  function openVideoModal() {
    const modal = document.getElementById('video-modal');
    const player = document.getElementById('modal-video-player');
    if (modal && player) {
      modal.style.display = 'flex';
      player.play().catch(e => console.log("Auto-play blocked or failed", e));
    }
  }

  function closeVideoModal() {
    const modal = document.getElementById('video-modal');
    const player = document.getElementById('modal-video-player');
    if (modal && player) {
      modal.style.display = 'none';
      player.pause();
    }
  }
</script>
