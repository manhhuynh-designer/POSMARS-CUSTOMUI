<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent !important;
  }

  :root {
    --frame-thickness: 16px;
  }

  /* --- BASE & WRAPPER --- */
  .posmars-result-wrapper {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* --- CAPTURED PREVIEW --- */
  .captured-preview {
    display: none !important;
  }

  .posmars-result-wrapper[data-has-photo="true"] .captured-preview {
    display: block !important;
    position: absolute;
    bottom: calc(var(--frame-thickness) + 285px);
    left: 50%;
    transform: translate(-50%, 0) rotate(-3deg);
    width: 110px;
    height: auto;
    aspect-ratio: 9 / 16;
    border: 4px solid #ffffff;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    z-index: 4; /* Below buttons (5), above frame (2) and live feed (1) */
    pointer-events: auto;
    cursor: pointer;
    object-fit: cover;
    animation: photoPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  /* Ẩn ảnh preview khi chưa chụp (mặc định là ảnh gif 1x1 trong suốt) */
  .captured-preview[src*="data:image/gif"] {
    display: none !important;
  }

  @keyframes photoPop {
    from { opacity: 0; transform: translate(-50%, 20px) scale(0.8) rotate(-6deg); }
    to { opacity: 1; transform: translate(-50%, 0) scale(1) rotate(-3deg); }
  }

  /* --- DYNAMIC PHOTO STATE MANAGEMENT --- */
  /* Trạng thái 1: Chưa chụp ảnh -> Ẩn ảnh preview */
  .posmars-result-wrapper[data-has-photo="false"] .captured-preview {
    display: none !important;
  }

  /* Solid border frame removed */



  /* --- TOP CENTER: BRAND LOGO --- */
  .brand-logo-container {
    position: absolute;
    top: calc(var(--frame-thickness) + 16px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .hud-logo {
    height: 40px;
    max-width: 140px;
    object-fit: contain;
    filter: drop-shadow(0 2px 8px rgba(0, 0, 0, 0.35));
  }

  /* --- BOTTOM CENTER ACTIONS CONTAINER --- */
  .bottom-actions-container {
    position: absolute;
    bottom: calc(var(--frame-thickness) + 200px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    width: calc(100% - var(--frame-thickness) * 2 - 32px);
    max-width: 290px;
  }

  .shutter-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: transparent;
    border: 4px solid #ffffff;
    padding: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 8px 32px rgba(0,0,0,0.3);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-sizing: border-box;
  }

  .shutter-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    transition: all 0.2s ease;
  }

  .shutter-text {
    font-size: 0.72rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.2;
    text-align: center;
  }

  .shutter-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 12px 40px rgba(0,0,0,0.4);
  }

  .shutter-btn:active .shutter-inner {
    transform: scale(0.9);
    background: {{primary_color}};
    color: #ffffff;
  }

  /* Cụm nút chuyển đổi sau khi chụp */
  .captured-actions {
    display: none;
    width: 100%;
    gap: 10px;
  }

  .posmars-result-wrapper[data-has-photo="true"] .captured-actions {
    display: flex;
  }

  .posmars-result-wrapper[data-has-photo="true"] .shutter-btn {
    display: none;
  }

  .action-btn-pill {
    padding: 10px 18px;
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    box-sizing: border-box;
  }

  .action-btn-pill:active {
    transform: translateY(1px);
  }

  .recapture-btn {
    background: rgba(15, 23, 42, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #ffffff;
    flex: 1;
  }

  .recapture-btn:hover {
    background: rgba(15, 23, 42, 0.8);
  }

  .next-btn-bottom {
    background: {{primary_color}};
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    flex: 1.3; /* Rộng hơn nút phụ một chút */
    box-shadow: 0 4px 16px {{primary_color}}40;
  }

  .next-btn-bottom:hover {
    filter: brightness(1.15);
  }

  .btn-icon {
    width: 14px;
    height: 14px;
  }



  /* --- TOP LEFT: RESTART --- */
  .restart-container {
    position: absolute;
    top: calc(var(--frame-thickness) + 16px);
    left: calc(var(--frame-thickness) + 16px);
    z-index: 5;
    pointer-events: auto;
  }

  .restart-link {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
  }

  .restart-link:hover {
    transform: scale(1.05);
    background: rgba(15, 23, 42, 0.8);
    border-color: rgba(255, 255, 255, 0.35);
  }

  .restart-link:active {
    transform: scale(0.95);
  }

  /* Control display of replay button based on can_replay state */
  .posmars-result-wrapper[data-can-replay="false"] .restart-container {
    display: none !important;
  }

  /* Brand logo container styles removed as logo is printed on the frame */

  /* Responsive Adjustments for Small Mobile Viewports */
  @media (max-width: 380px) {
    :root {
      --frame-thickness: 12px;
    }
    .restart-container {
      top: calc(var(--frame-thickness) + 10px);
      left: calc(var(--frame-thickness) + 10px);
    }
    .restart-link {
      padding: 6px 12px;
      font-size: 0.7rem;
    }
    .hud-logo {
      height: 32px;
      max-width: 110px;
    }
    .shutter-btn {
      width: 64px;
      height: 64px;
    }
    .action-btn-pill {
      padding: 8px 14px;
      font-size: 0.78rem;
    }
    .bottom-actions-container {
      bottom: calc(var(--frame-thickness) + 175px) !important;
    }
    .posmars-result-wrapper[data-has-photo="true"] .captured-preview {
      bottom: calc(var(--frame-thickness) + 255px) !important;
    }
  }

  /* --- PHOTO ZOOM MODAL --- */
  .photo-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    cursor: pointer;
    pointer-events: auto !important;
  }

  .photo-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .photo-modal-content {
    position: relative;
    max-width: 90%;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    border: 3px solid #ffffff;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 10;
    animation: photoModalScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes photoModalScale {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .photo-modal-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s;
  }

  .photo-modal-close:hover {
    background: rgba(239, 68, 68, 0.9);
  }

  /* --- START NOTIFICATION OVERLAY --- */
  .start-notification {
    position: fixed;
    inset: 0;
    z-index: 999;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(15, 23, 42, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    
    /* CSS animation sequence to display for 3s and then fade out */
    animation: fadeOutSequence 3.5s forwards;
    pointer-events: auto;
  }

  .start-notification.fade-out {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
  }

  /* Override: Do not show start popup notification if user has already taken a photo */
  .posmars-result-wrapper[data-has-photo="true"] .start-notification {
    display: none !important;
    opacity: 0 !important;
    visibility: hidden !important;
    pointer-events: none !important;
  }

  @keyframes fadeOutSequence {
    0% {
      opacity: 1;
      visibility: visible;
    }
    85% {
      opacity: 1;
      visibility: visible;
    }
    99% {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    100% {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      display: none !important;
    }
  }

  .notification-content {
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.55), rgba(251, 235, 255, 0.35));
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1.5px solid rgba(255, 255, 255, 0.6);
    border-radius: 28px;
    padding: 2.25rem 2rem;
    width: calc(100% - 40px);
    max-width: 320px;
    text-align: center;
    box-shadow: 0 24px 48px rgba(15, 23, 42, 0.25),
                inset 0 0 20px rgba(255, 255, 255, 0.4),
                0 0 30px -5px {{primary_color}}20;
    animation: notificationPop 0.55s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
    pointer-events: auto;
  }

  @keyframes notificationPop {
    from { opacity: 0; transform: scale(0.85) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }

  .notification-emoji {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  .notification-title {
    font-size: 1.45rem;
    font-weight: 900;
    color: #0f172a;
    margin-bottom: 0.6rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
  }

  .notification-text {
    font-size: 1.15rem;
    font-weight: 800;
    color: #1e293b;
    margin-bottom: 0.85rem;
    line-height: 1.4;
  }

  .highlight-score {
    color: {{primary_color}};
    font-size: 1.5rem;
    font-weight: 900;
    text-shadow: 0 0 15px {{primary_color}}40;
  }

  .notification-subtext {
    font-size: 0.95rem;
    font-weight: 800;
    color: #ffffff;
    background: {{primary_color}};
    padding: 8px 20px;
    border-radius: 99px;
    display: inline-block;
    box-shadow: 0 4px 16px {{primary_color}}40;
    letter-spacing: 0.02em;
    text-transform: uppercase;
  }
</style>

<div class="posmars-result-wrapper" data-has-photo="{{has_captured_image}}" data-can-replay="{{can_replay}}">
  <!-- Start Notification Overlay (Fades out after 3s) -->
  <div id="start-notification" class="start-notification">
    <div class="notification-content">
      <div class="notification-title">{{result_title_text}}</div>
      <div class="notification-text">
        Bạn đã tẩy trang sạch <span class="highlight-score">{{score}}%</span>
      </div>
      <div class="notification-subtext">Hãy chụp ảnh để flex ngay nào!</div>
    </div>
  </div>

  <!-- Captured Photo Preview (AR screen capture will update here) -->
  <img src="{{captured_image}}" class="captured-preview" onclick="openPhotoModal()" onerror="this.style.display='none';" />

  <!-- Top-left Restart Link -->
  <div class="restart-container">
    <a class="restart-link" data-action="restart">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
        <path d="M16 3h5v5"></path>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
        <path d="M8 21H3v-5"></path>
      </svg>
      <span>{{replay_button_text}}</span>
    </a>
  </div>

  <!-- Top Center Brand Logo -->
  <div class="brand-logo-container">
    <img src="{{logo_url}}" alt="Logo" class="hud-logo" onerror="this.style.display='none';" />
  </div>

  <!-- Bottom Actions Container (Capture / Shutter in State 1, Recapture + Next in State 2) -->
  <div class="bottom-actions-container">
    <!-- Shutter Button (Visible only in State 1) -->
    <button class="shutter-btn" data-action="capture">
      <div class="shutter-inner">
        <span class="shutter-text">Chụp ảnh</span>
      </div>
    </button>

    <!-- Side-by-side Actions (Visible only in State 2) -->
    <div class="captured-actions">
      <button class="action-btn-pill recapture-btn" data-action="capture">
        <span>Chụp lại</span>
      </button>
      <button class="action-btn-pill next-btn-bottom" data-action="next">
        <span>{{result_button_text}}</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Photo Modal (Dialog lớn xem ảnh full screen) -->
<div id="photo-modal" class="photo-modal" style="display: none;" onclick="closePhotoModal()">
  <div class="photo-modal-backdrop"></div>
  <img id="modal-photo-img" class="photo-modal-content" src="" />
  <button class="photo-modal-close" onclick="closePhotoModal()">&times;</button>
</div>

<script>
  function openPhotoModal() {
    const previewImg = document.querySelector('.captured-preview');
    const modal = document.getElementById('photo-modal');
    const modalImg = document.getElementById('modal-photo-img');
    if (previewImg && modal && modalImg) {
      modalImg.src = previewImg.src;
      modal.style.display = 'flex';
    }
  }

  function closePhotoModal() {
    const modal = document.getElementById('photo-modal');
    if (modal) {
      modal.style.display = 'none';
    }
  }

  // Run the fade-out timer immediately since the elements are already parsed above this script
  const notification = document.getElementById('start-notification');
  if (notification) {
    setTimeout(() => {
      notification.classList.add('fade-out');
    }, 3000);
  }
</script>
