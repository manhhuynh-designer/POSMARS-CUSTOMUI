<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent !important;
  }

  :root {
    --frame-thickness: 16px;
  }

  /* --- BASE & WRAPPER --- */
  .posmars-result-wrapper {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden;
  }

  /* --- CAPTURED PREVIEW --- */
  .captured-preview-wrapper {
    display: none !important;
  }

  .posmars-result-wrapper[data-has-photo="true"] ~ .captured-preview-wrapper {
    display: block !important;
    position: absolute;
    bottom: calc(16.67% + 35px); /* Raised to sit above the bottom actions bar and avoid overlap */
    left: 20px;
    transform: rotate(-3deg);
    width: 90px;
    height: 160px; /* Explicit height to prevent child img height collapse on mobile WebViews */
    z-index: 4; /* Below buttons (5), above frame (2) and live feed (1) */
    pointer-events: auto !important;
    cursor: pointer;
    animation: photoPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
  }

  .captured-preview {
    width: 100%;
    height: 100%;
    border: 4px solid #ffffff;
    border-radius: 12px;
    box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4);
    object-fit: cover;
    display: none; /* Hide by default to prevent browser grey placeholder */
    box-sizing: border-box;
  }

  .captured-preview.loaded {
    display: block; /* Show only when loaded successfully */
  }

  /* Ẩn ảnh preview khi chưa chụp (mặc định là ảnh gif 1x1 trong suốt) */
  .captured-preview[src*="data:image/gif"] {
    display: none !important;
  }

  @keyframes photoPop {
    from { opacity: 0; transform: translateY(20px) scale(0.8) rotate(-6deg); }
    to { opacity: 1; transform: translateY(0) scale(1) rotate(-3deg); }
  }

  /* --- DYNAMIC PHOTO STATE MANAGEMENT --- */
  /* Trạng thái 1: Chưa chụp ảnh -> Ẩn ảnh preview */
  .posmars-result-wrapper[data-has-photo="false"] ~ .captured-preview-wrapper {
    display: none !important;
  }

  /* Solid border frame removed */



  /* --- MCW FRAME OVERLAY --- */
  .mcw-frame-overlay {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 2; /* below buttons (5), above live feed */
    pointer-events: none;
  }

  /* --- BOTTOM CENTER ACTIONS CONTAINER --- */
  .bottom-actions-container {
    position: absolute;
    bottom: calc(16.67% - 40px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    width: calc(100% - var(--frame-thickness) * 2 - 32px);
    max-width: 290px;
  }

  .shutter-btn {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: transparent;
    border: 4px solid #ffffff;
    padding: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(255, 255, 255, 0.4), 0 8px 32px rgba(0,0,0,0.3);
    transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-sizing: border-box;
  }

  .shutter-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #0f172a;
    transition: all 0.2s ease;
  }

  .shutter-text {
    font-size: 0.72rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.03em;
    line-height: 1.2;
    text-align: center;
  }

  .shutter-btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 12px 40px rgba(0,0,0,0.4);
  }

  .shutter-btn:active .shutter-inner {
    transform: scale(0.9);
    background: {{primary_color}};
    color: #ffffff;
  }

  /* Cụm nút chuyển đổi sau khi chụp */
  .captured-actions {
    display: none;
    width: 100%;
    gap: 10px;
  }

  .posmars-result-wrapper[data-has-photo="true"] .captured-actions {
    display: flex;
  }

  .posmars-result-wrapper[data-has-photo="true"] .shutter-btn {
    display: none;
  }

  .action-btn-pill {
    padding: 10px 18px;
    border-radius: 99px;
    font-size: 0.85rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all 0.2s ease;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    box-sizing: border-box;
  }

  .action-btn-pill:active {
    transform: translateY(1px);
  }

  .recapture-btn {
    background: rgba(15, 23, 42, 0.65);
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: #ffffff;
    flex: 1;
  }

  .recapture-btn:hover {
    background: rgba(15, 23, 42, 0.8);
  }

  .next-btn-bottom {
    background: {{primary_color}};
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    flex: 1.3; /* Rộng hơn nút phụ một chút */
    box-shadow: 0 4px 16px {{primary_color}}40;
  }

  .next-btn-bottom:hover {
    filter: brightness(1.15);
  }

  .btn-icon {
    width: 14px;
    height: 14px;
  }



  /* --- TOP LEFT: RESTART --- */
  .restart-container {
    position: absolute;
    top: calc(var(--frame-thickness) + 16px);
    left: calc(var(--frame-thickness) + 16px);
    z-index: 5;
    pointer-events: auto;
  }

  .restart-link {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    color: #ffffff;
    padding: 8px 16px;
    border-radius: 99px;
    font-size: 0.75rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    text-decoration: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.2s ease;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
  }

  .restart-link:hover {
    transform: scale(1.05);
    background: rgba(15, 23, 42, 0.8);
    border-color: rgba(255, 255, 255, 0.35);
  }

  .restart-link:active {
    transform: scale(0.95);
  }

  /* Control display of replay button based on can_replay state */
  .posmars-result-wrapper[data-can-replay="false"] .restart-container {
    display: none !important;
  }

  /* --- TOP RIGHT: SWITCH CAMERA --- */
  .switch-camera-container {
    position: absolute;
    top: 23.44%;
    left: 87.96%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: auto;
  }

  .switch-camera-btn {
    background: rgba(15, 23, 42, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255, 255, 255, 0.2);
    color: #ffffff;
    padding: 8px;
    border-radius: 50%;
    width: 38px;
    height: 38px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.25);
    box-sizing: border-box;
  }

  .switch-camera-btn:hover {
    transform: scale(1.05);
    background: rgba(15, 23, 42, 0.8);
    border-color: rgba(255, 255, 255, 0.35);
  }

  .switch-camera-btn:active {
    transform: scale(0.95);
  }

  /* --- TOP RIGHT SCORE DISPLAY --- */
  .score-display-container {
    position: absolute;
    top: 14.32%;
    left: 88.43%;
    transform: translate(-50%, -50%);
    z-index: 3; /* above frame overlay, below modals */
    pointer-events: none;
  }

  .score-display-value {
    font-size: 7.6vw;
    font-weight: 900;
    color: #312937;
    /* Soft text shadow to match photo_score_shadow_color (#feecf1) */
    text-shadow: 
      -2px -2px 0 #feecf1,  
       2px -2px 0 #feecf1,
      -2px  2px 0 #feecf1,
       2px  2px 0 #feecf1,
       0 0 15px #feecf1;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1;
  }

  /* Brand logo container styles removed as logo is printed on the frame */

  /* Responsive Adjustments for Small Mobile Viewports */
  @media (max-width: 380px) {
    :root {
      --frame-thickness: 12px;
    }
    .restart-container {
      top: calc(var(--frame-thickness) + 10px);
      left: calc(var(--frame-thickness) + 10px);
    }
    .restart-link {
      padding: 6px 12px;
      font-size: 0.7rem;
    }

    .switch-camera-btn {
      width: 32px;
      height: 32px;
      padding: 6px;
    }

    .shutter-btn {
      width: 64px;
      height: 64px;
    }
    .action-btn-pill {
      padding: 8px 14px;
      font-size: 0.78rem;
    }
    .bottom-actions-container {
      bottom: calc(16.67% - 32px) !important;
    }
    .posmars-result-wrapper[data-has-photo="true"] ~ .captured-preview-wrapper {
      bottom: calc(16.67% + 30px) !important; /* Raised to sit above the bottom actions bar and avoid overlap */
      left: 15px !important;
      width: 70px !important;
      height: 124px !important; /* Explicit height override for mobile */
    }
  }

  /* --- PHOTO ZOOM MODAL --- */
  .photo-modal {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    cursor: pointer;
    pointer-events: auto !important;
  }

  .photo-modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(15, 23, 42, 0.9);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .photo-modal-content {
    position: relative;
    max-width: 90%;
    max-height: 85vh;
    object-fit: contain;
    border-radius: 12px;
    border: 3px solid #ffffff;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 10;
    animation: photoModalScale 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }

  @keyframes photoModalScale {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .photo-modal-close {
    position: absolute;
    top: 24px;
    right: 24px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(255, 255, 255, 0.3);
    color: #ffffff;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 20;
    transition: background 0.2s;
  }

  .photo-modal-close:hover {
    background: rgba(239, 68, 68, 0.9);
  }


</style>

<div class="posmars-result-wrapper" data-has-photo="{{has_captured_image}}" data-can-replay="{{can_replay}}">


  <!-- Top-left Restart Link -->
  <div class="restart-container">
    <a class="restart-link" data-action="restart">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path>
        <path d="M16 3h5v5"></path>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path>
        <path d="M8 21H3v-5"></path>
      </svg>
      <span>{{replay_button_text}}</span>
    </a>
  </div>

  <!-- Top-right Score Display -->
  <div class="score-display-container">
    <span class="score-display-value">{{score}}%</span>
  </div>

  <!-- Top-right Switch Camera Button -->
  <div class="switch-camera-container">
    <button class="switch-camera-btn" data-action="switch_camera" title="Đổi camera">
      <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 18px; height: 18px;">
        <path d="M23 4v6h-6"></path>
        <path d="M1 20v-6h6"></path>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    </button>
  </div>

  <!-- MCW Frame Overlay -->
  <img src="{{extra_asset_mcw_frame}}" alt="Frame" class="mcw-frame-overlay" onerror="this.style.display='none';" />

  <!-- Bottom Actions Container (Capture / Shutter in State 1, Recapture + Next in State 2) -->
  <div class="bottom-actions-container">
    <!-- Shutter Button (Visible only in State 1) -->
    <button class="shutter-btn" data-action="capture">
      <div class="shutter-inner">
        <span class="shutter-text">Chụp ảnh</span>
      </div>
    </button>

    <!-- Side-by-side Actions (Visible only in State 2) -->
    <div class="captured-actions">
      <button class="action-btn-pill recapture-btn" data-action="capture">
        <span>Chụp lại</span>
      </button>
      <button class="action-btn-pill next-btn-bottom" data-action="next">
        <span>{{result_button_text}}</span>
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14"></path>
          <path d="m12 5 7 7-7 7"></path>
        </svg>
      </button>
    </div>
  </div>

</div>

<!-- Captured Photo Preview (AR screen capture will update here) -->
<div class="captured-preview-wrapper" onclick="openPhotoModal()">
  <img src="{{captured_image}}" class="captured-preview" onload="this.classList.add('loaded');" onerror="this.classList.remove('loaded');" />
</div>

<!-- Photo Modal (Dialog lớn xem ảnh full screen) -->
<div id="photo-modal" class="photo-modal" style="display: none;" onclick="closePhotoModal()">
  <div class="photo-modal-backdrop"></div>
  <img id="modal-photo-img" class="photo-modal-content" src="" />
  <button class="photo-modal-close" onclick="closePhotoModal()">&times;</button>
</div>

<script>
  function openPhotoModal() {
    const previewImg = document.querySelector('.captured-preview');
    const modal = document.getElementById('photo-modal');
    const modalImg = document.getElementById('modal-photo-img');
    if (previewImg && modal && modalImg) {
      modalImg.src = previewImg.src;
      modal.style.display = 'flex';
    }
  }

  function closePhotoModal() {
    const modal = document.getElementById('photo-modal');
    if (modal) {
      modal.style.display = 'none';
    }
  }


</script>
